edit_uri: ""
markdown_extensions:
  - admonition
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tasklist:
      clickable_checkbox: false
      custom_checkbox: true
  - toc:
      permalink: true
      toc_depth: 3
repo_name: nahualito/wintermute
repo_url: https://github.com/nahualito/wintermute
site_name: wintermute docs
site_url: "http://localhost:8000"
theme:
  favicon: assets/images/favicon.png
  features:
    - content.code.copy
    - header.autohide
    - navigation.instant
    - navigation.top
  font: false
  icon:
    logo: octicons/book-24
    repo: octicons/mark-github-16
  name: readthedocs
  highlightjs: true
  hljs_languages:
    - python
    - yaml
  palette:
    - media: "(prefers-color-scheme: dark)"
      accent: cyan
      primary: cyan
      scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      accent: cyan
      primary: cyan
      scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
use_directory_urls: true
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
  - gen-files:
      scripts:
        - gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md # CHANGED: Points to root file
  - section-index
